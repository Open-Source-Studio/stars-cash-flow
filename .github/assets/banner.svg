<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Stars Cash Flow — Telegram Stars CPA platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#172a55"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Decorative stars -->
  <g opacity="0.18" fill="#fff">
    <circle cx="1040" cy="80"  r="1.8"/>
    <circle cx="1100" cy="140" r="1.2"/>
    <circle cx="980"  cy="200" r="1.6"/>
    <circle cx="1150" cy="220" r="1.4"/>
    <circle cx="920"  cy="60"  r="1.0"/>
    <circle cx="1080" cy="270" r="1.6"/>
    <circle cx="860"  cy="130" r="1.2"/>
  </g>

  <!-- Hero star -->
  <g transform="translate(960 60) scale(1.4)" opacity="0.95">
    <polygon points="80,0 99.6,57.3 160,57.3 111.4,93 130.4,150.3 80,115 29.6,150.3 48.6,93 0,57.3 60.4,57.3"
             fill="url(#accent)" filter="url(#soft)"/>
    <polygon points="80,0 99.6,57.3 160,57.3 111.4,93 130.4,150.3 80,115 29.6,150.3 48.6,93 0,57.3 60.4,57.3"
             fill="#fff" opacity="0.9"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(64 92)">
    <text fill="#9eb0cb" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" letter-spacing="6">✨  STARS CASH FLOW</text>
    <text y="72" fill="#ffffff" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="60" font-weight="900" letter-spacing="-1.5">Telegram Stars CPA platform</text>
    <text y="120" fill="#c8d7ef" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="500">Bot · Mini App · SMM-Panel-compatible reseller API</text>
  </g>

  <!-- Pills -->
  <g transform="translate(64 250)" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">
    <g transform="translate(0 0)">
      <rect width="140" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
      <text x="14" y="22" fill="#fff">⭐ Telegram Stars</text>
    </g>
    <g transform="translate(154 0)">
      <rect width="120" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
      <text x="14" y="22" fill="#fff">💎 TON · CryptoBot</text>
    </g>
    <g transform="translate(288 0)">
      <rect width="170" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
      <text x="14" y="22" fill="#fff">🔌 JustAnotherPanel API</text>
    </g>
    <g transform="translate(472 0)">
      <rect width="110" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
      <text x="14" y="22" fill="#fff">🛡️ Real users</text>
    </g>
  </g>
</svg>
